name: Publish as NPM Package

on:
  push:
    # branches: [develop]
    branches:
      - 'change/build-output'

# on:
#   push:
#     tags:
#       - '*'

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      # Install needs GitHub Packages auth for private @cuweb dependencies.
      # Do not set an npmjs auth token here; publish should use OIDC Trusted Publishing.
      - name: Configure GitHub Packages auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm build
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test --run

      # npm 11.5.1+ implements the GitHub → npm OIDC exchange used by
      # Trusted Publishing. pnpm publish does not, so we use npm here.
      - run: npm install -g npm@latest
      - run: npm publish --access public --provenance
